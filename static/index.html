<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Интервью-бот</title>
<style>
  :root {
    --bg: #0f1115;
    --card: #171a21;
    --border: #2a2e38;
    --text: #e8e9ec;
    --muted: #8b8f9a;
    --accent: #5b8def;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    padding: 24px;
  }
  .card {
    width: 100%;
    max-width: 560px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 28px;
  }
  h1 {
    font-size: 18px;
    font-weight: 600;
    margin: 0 0 6px;
  }
  .question {
    color: var(--muted);
    font-size: 15px;
    margin-bottom: 18px;
    line-height: 1.5;
  }
  .label {
    display: block;
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 6px;
  }
  input[type="text"]#apiKey {
    width: 100%;
    background: #0f1115;
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    padding: 10px 14px;
    font-size: 14px;
    font-family: inherit;
    outline: none;
  }
  input[type="text"]#apiKey:focus { border-color: var(--accent); }
  .hint {
    font-size: 12px;
    color: var(--muted);
    margin-top: 6px;
    margin-bottom: 18px;
    line-height: 1.4;
  }
  .hint a { color: var(--accent); }
  textarea {
    width: 100%;
    min-height: 120px;
    resize: vertical;
    background: #0f1115;
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    padding: 12px 14px;
    font-size: 15px;
    font-family: inherit;
    outline: none;
  }
  textarea:focus { border-color: var(--accent); }
  button {
    margin-top: 14px;
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: var(--accent);
    color: white;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
  }
  button:disabled {
    opacity: 0.5;
    cursor: default;
  }
  .reply-box {
    margin-top: 20px;
    padding: 14px 16px;
    background: #12151b;
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 15px;
    line-height: 1.5;
    display: none;
    white-space: pre-wrap;
  }
  .reply-box.visible { display: block; }
  .error {
    color: #f07171;
    margin-top: 12px;
    font-size: 14px;
    display: none;
  }
  .error.visible { display: block; }
</style>
</head>
<body>
  <div class="card">
    <h1>Короткое интервью</h1>

    <label class="label" for="apiKey">OpenRouter API Key</label>
    <input type="text" id="apiKey" placeholder="sk-or-v1-..." autocomplete="off" spellcheck="false">
    <div class="hint">
      Ключ нужен для вызова модели. Получить бесплатно на
      <a href="https://openrouter.ai/keys" target="_blank" rel="noopener">openrouter.ai/keys</a>.
      Отправляется только в момент запроса, нигде не сохраняется.
    </div>

    <div class="question" id="question">Загружаю вопрос...</div>
    <textarea id="answer" placeholder="Ваш ответ..."></textarea>
    <button id="submit">Отправить</button>
    <div class="error" id="error"></div>
    <div class="reply-box" id="reply"></div>
  </div>

<script>
  const questionEl = document.getElementById("question");
  const answerEl = document.getElementById("answer");
  const apiKeyEl = document.getElementById("apiKey");
  const submitEl = document.getElementById("submit");
  const replyEl = document.getElementById("reply");
  const errorEl = document.getElementById("error");

  async function loadQuestion() {
    try {
      const res = await fetch("/api/question");
      const data = await res.json();
      questionEl.textContent = data.question;
    } catch {
      questionEl.textContent = "Расскажите, как вы выбирали последний онлайн-курс?";
    }
  }

  async function submitAnswer() {
    const answer = answerEl.value.trim();
    const apiKey = apiKeyEl.value.trim();
    errorEl.classList.remove("visible");
    replyEl.classList.remove("visible");

    if (!apiKey) {
      errorEl.textContent = "Введите OpenRouter API Key";
      errorEl.classList.add("visible");
      return;
    }
    if (!answer) {
      errorEl.textContent = "Введите ответ перед отправкой";
      errorEl.classList.add("visible");
      return;
    }

    submitEl.disabled = true;
    submitEl.textContent = "Отправляю...";

    try {
      const res = await fetch("/api/respond", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ answer, api_key: apiKey }),
      });

      if (!res.ok) {
        let detail = `HTTP ${res.status}`;
        try {
          const err = await res.json();
          if (err.detail) detail = err.detail;
        } catch {
          // ответ не в формате JSON — оставляем detail как есть
        }
        throw new Error(detail);
      }

      const data = await res.json();
      replyEl.textContent = data.reply;
      replyEl.classList.add("visible");
    } catch (e) {
      errorEl.textContent = e.message || "Что-то пошло не так";
      errorEl.classList.add("visible");
    } finally {
      submitEl.disabled = false;
      submitEl.textContent = "Отправить";
    }
  }

  submitEl.addEventListener("click", submitAnswer);
  loadQuestion();
</script>
</body>
</html>
